<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.webp" type="image/x-icon">
    <link rel="stylesheet" href="loginCadastro.css">
    <title>Cadastro</title>
</head>
<body>

    <div id="formulario">
        <div class="formulario-imagem">

        <img src="img/imagem login.png" alt="">

        <div class="cadastro">
            <form id="formulario-cadastro">
                <label for="nome">Nome:</label>
                <input id="nome-login" type="text" placeholder="Digite o seu nome:">
                <br>
                
                <label for="email">Email:</label>
                <input id="email-login" type="text" placeholder="Digite o seu e-mail:">
                <br>
                
                <label for="senha">Senha:</label>
                <input id="senha-login" type="number" placeholder="Digite uma senha:">
                <br>

                <button type="submit">Enviar</button>
            </form>
        </div>
        </div>

        <p>Já tem uma conta?</p>
        <a href="login.html">Faça login</a>
    </div>

  <script type="module" src="cadastro.js"></script>
</body>
</html>
