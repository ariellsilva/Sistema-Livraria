<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.webp" type="image/x-icon">
    <link rel="stylesheet" href="loginCadastro.css">
    <title>Login</title>
</head>
<body>

    <div id="formulario">

    <div class="formulario-imagem">
    <div class="login">
    <form id="formulario-login">
     <label for="nome">Nome:</label>
     <input id="nome-login" type="text" placeholder="Digite o seu nome:">
     <br>
     <label for="email">Email:</label>
     <input id="email-login" type="text" placeholder="Digite o seu e-mail:">
     <br>
     <label for="passeword">Senha:</label>
     <input id="senha-login" type="number" placeholder="Digite uma senha:">
     <br>

     <button>Enviar</button>
    </form>
    </div>

    <img src="img/imagem login.png" alt="">
    </div>

    <p>Não tem uma conta?</p>
    <a href="cadastro.html">Cadastre-se</a>

    </div>

<script type="module" src="login.js"></script>
    
</body>
</html>
